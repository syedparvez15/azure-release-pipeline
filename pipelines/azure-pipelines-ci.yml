# azure-pipelines-ci.yml
# ----------------------
# Continuous Integration pipeline — runs on every push to feature branches and PRs.
# Installs dependencies, runs linting, and executes the test suite.

trigger:
  branches:
    exclude:
      - main
      - release/*

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.11"
  pipCacheDir: $(Pipeline.Workspace)/.pip

stages:
  - stage: CI
    displayName: "Continuous Integration"
    jobs:
      - job: Build_and_Test
        displayName: "Install, Lint & Test"
        steps:

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
              addToPath: true
            displayName: "Set Python version"

          - task: Cache@2
            inputs:
              key: 'pip | "$(Agent.OS)" | requirements.txt'
              restoreKeys: |
                pip | "$(Agent.OS)"
              path: $(pipCacheDir)
            displayName: "Cache pip packages"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install flake8 pytest pytest-cov
            displayName: "Install dependencies"

          - script: |
              flake8 src/ --max-line-length=120 --exclude=__pycache__
            displayName: "Lint with flake8"

          - script: |
              pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
            displayName: "Run tests with coverage"

          - task: PublishTestResults@2
            inputs:
              testResultsFiles: "**/test-results.xml"
              testRunTitle: "Unit Tests"
            condition: succeededOrFailed()
            displayName: "Publish test results"

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: "**/coverage.xml"
            displayName: "Publish code coverage"
