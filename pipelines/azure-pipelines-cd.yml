# azure-pipelines-cd.yml
# ----------------------
# Continuous Deployment pipeline — triggered on merges to main.
# Deploys to staging automatically, production requires manual approval.

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.11"
  stagingAppName: "myapp-staging"
  productionAppName: "myapp-production"
  resourceGroup: "myapp-rg"

stages:

  # ── STAGE 1: Build ──────────────────────────────────────────
  - stage: Build
    displayName: "Build & Package"
    jobs:
      - job: Build
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install dependencies"

          - script: |
              pytest tests/ -v
            displayName: "Run tests"

          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: "$(Build.SourcesDirectory)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip"
              replaceExistingArchive: true
            displayName: "Package application"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "drop"
            displayName: "Publish artifact"

  # ── STAGE 2: Deploy to Staging ──────────────────────────────
  - stage: Deploy_Staging
    displayName: "Deploy → Staging"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployStaging
        displayName: "Deploy to Staging"
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: "$(AZURE_SUBSCRIPTION)"
                    appType: webAppLinux
                    appName: "$(stagingAppName)"
                    package: "$(Pipeline.Workspace)/drop/$(Build.BuildId).zip"
                  displayName: "Deploy to Azure App Service (Staging)"

                - script: |
                    echo "Running smoke tests against staging..."
                    curl -f https://$(stagingAppName).azurewebsites.net/health || exit 1
                  displayName: "Smoke test — staging health check"

  # ── STAGE 3: Deploy to Production (manual approval) ─────────
  - stage: Deploy_Production
    displayName: "Deploy → Production"
    dependsOn: Deploy_Staging
    condition: succeeded()
    jobs:
      - deployment: DeployProduction
        displayName: "Deploy to Production"
        environment: production          # Requires manual approval gate in Azure DevOps
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: "$(AZURE_SUBSCRIPTION)"
                    appType: webAppLinux
                    appName: "$(productionAppName)"
                    package: "$(Pipeline.Workspace)/drop/$(Build.BuildId).zip"
                  displayName: "Deploy to Azure App Service (Production)"

                - script: |
                    echo "Running post-deploy smoke tests..."
                    curl -f https://$(productionAppName).azurewebsites.net/health || exit 1
                  displayName: "Smoke test — production health check"
